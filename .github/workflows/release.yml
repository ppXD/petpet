# Tauri release builds for every supported platform.
#
# Triggered by pushing a `v*` tag (e.g. `v0.2.0`); produces a draft
# GitHub Release with installers attached:
#
#   macOS:   universal .dmg (arm64 + Intel in one bundle)
#   Linux:   .deb + .AppImage  (x86_64-unknown-linux-gnu)
#   Windows: .msi              (x86_64-pc-windows-msvc)
#
# The release is created as a draft so the maintainer reviews the
# artifacts before clicking "Publish" — that's the chance to catch a
# missing icon / broken installer before users see it.
#
# # macOS signing & notarization
#
# All Apple secrets are OPTIONAL. With them set, `tauri-action`
# signs + notarizes and produces a Gatekeeper-clean .dmg. Without
# them, the .dmg is unsigned and users need `xattr -cr` to launch
# (instructions in the release body).
#
# Required secrets for full notarization (skip any to fall back to
# unsigned):
#
#   APPLE_CERTIFICATE             base64(.p12 Developer ID Application cert)
#   APPLE_CERTIFICATE_PASSWORD    password of the .p12
#   APPLE_SIGNING_IDENTITY        e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                      Apple ID email
#   APPLE_PASSWORD                app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                 10-char team id from developer.apple.com
#
# # Why not test.yml's tag-push trigger?
#
# Releases are slower (~10–20 min per platform, especially Windows),
# heavier (frontend bundle + Tauri webview integration), and produce
# binaries — qualitatively different from the per-commit smoke tests
# in test.yml. Kept separate so a flaky release build doesn't block
# routine PR merges.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v0.1.0) — must already exist on the repo'
        required: true

permissions:
  contents: write    # tauri-action creates the release + uploads assets

jobs:
  publish-tauri:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
            label: 'macOS (universal)'
          - os: ubuntu-22.04
            args: ''
            label: 'Linux x64'
          - os: windows-latest
            args: ''
            label: 'Windows x64'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # ─── Toolchains ──────────────────────────────────────────────
      # macOS universal needs BOTH rustc targets so `lipo` can produce
      # a fat binary. Other platforms only need their native target.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets (universal build)
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          # Distinct cache per platform — they share zero artifacts.
          key: ${{ matrix.os }}-release

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # ─── macOS signing env (conditional) ─────────────────────────
      # Tauri's bundler reads APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY
      # directly from process env. If we pass them as empty strings
      # (the default when secrets are unset), Tauri attempts to
      # `security import` an empty file and the build fails with
      # "failed to import keychain certificate".
      #
      # So: gate on APPLE_CERTIFICATE non-empty. Only export the
      # Apple vars to subsequent steps when a real cert is present.
      # Otherwise the env vars stay unset → Tauri falls back to
      # ad-hoc signing → unsigned .dmg + xattr workaround documented
      # in the release body.
      - name: Configure macOS signing env (if secrets available)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID }}
          APPLE_PWD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "macOS signing: ENABLED (notarized release)"
            {
              echo "APPLE_CERTIFICATE=$APPLE_CERT"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERT_PWD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_IDENTITY"
              echo "APPLE_ID=$APPLE_ID_EMAIL"
              echo "APPLE_PASSWORD=$APPLE_PWD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM"
            } >> "$GITHUB_ENV"
          else
            echo "macOS signing: DISABLED — APPLE_CERTIFICATE secret not set."
            echo "Build will produce an unsigned .dmg; users need 'xattr -cr' on install."
          fi

      # ─── Linux-only system deps ──────────────────────────────────
      # Tauri 2 on GTK needs webkit2gtk + AppIndicator headers to
      # produce the .deb / .AppImage. Pulled fresh per run (cheap;
      # ~30s) rather than cached — the runner image bumps versions
      # occasionally and a stale cache silently miscompiles.
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            file

      # ─── The actual build ────────────────────────────────────────
      # Apple env vars come from the preceding "Configure macOS signing
      # env" step (via $GITHUB_ENV), only when secrets are non-empty.
      # Passing them directly here as `env:` would set empty strings
      # for unconfigured repos, which breaks Tauri's bundler.
      - name: Build + publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'petpet ${{ inputs.tag || github.ref_name }}'
          # Release stays a draft so the maintainer can review artifacts
          # + edit the body before users see it.
          releaseDraft: true
          prerelease: false
          releaseBody: |
            ## Install

            ### macOS (universal — Apple Silicon + Intel)

            Download the `.dmg`, drag petpet to `/Applications`, then **strip the quarantine attribute** (the build is unsigned for now):

            ```sh
            xattr -cr /Applications/petpet.app
            ```

            Open as usual after that. This unlocks the app on macOS Sonoma+ where Gatekeeper otherwise blocks unsigned downloads with an "is damaged" warning.

            > **Why the workaround?** petpet ships without Apple Developer notarization at this stage ($99/year per Apple). Once we have an Apple Developer account configured, the warning disappears completely.

            ### Linux x64

            Pick whichever your distro prefers:

            ```sh
            # Debian / Ubuntu
            sudo dpkg -i petpet_*_amd64.deb

            # AppImage (portable; no install needed)
            chmod +x petpet_*_amd64.AppImage
            ./petpet_*_amd64.AppImage
            ```

            ### Windows x64

            Run the `petpet_*_x64_en-US.msi` installer; double-click to launch from the Start menu after install.

            ---

            🤖 Generated by `.github/workflows/release.yml`. Artifacts built on GitHub-hosted runners; binaries reproducible from the source tree at this tag.
          args: ${{ matrix.args }}

  # ─── Tidy artifact names ───────────────────────────────────────────
  # Tauri stamps platform / arch / locale into output names by default:
  #
  #   petpet_0.1.0_universal.dmg       ← drop "_universal"
  #   petpet_universal.app.tar.gz      ← drop "universal"
  #   petpet_0.1.0_x64_en-US.msi       ← drop "_en-US"
  #
  # Linux names (`_amd64.deb`, `.AppImage`, `.rpm`) are fine as-is.
  #
  # Runs as a separate job (not per-matrix step) to avoid:
  #   1. Race condition — every matrix entry uploads in parallel; the
  #      first one wins the release-creation race, others append. A
  #      per-matrix rename can fire BEFORE the release is fully
  #      populated → asset-not-found.
  #   2. Windows Git-Bash path-rewriting — `gh api "/repos/..."` on
  #      windows-latest gets `/repos/` rewritten to `C:/Program Files/
  #      Git/repos/...`. Running on ubuntu sidesteps it entirely.
  #   3. Draft-release tag mismatch — GitHub doesn't bind drafts to
  #      tags formally, so `/releases/tags/X` returns 404 for drafts.
  #      `gh release view <tag>` handles that correctly by listing
  #      drafts and matching by tag/name.
  tidy-asset-names:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Rename macOS + Windows assets to drop arch/locale noise
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REL_ID=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json id --jq .id)
          echo "Release id: $REL_ID"

          rename_asset() {
            local old="$1" new="$2"
            local id
            # No leading `/` on endpoint — Windows Git-Bash issue is
            # ubuntu-irrelevant but keeping the convention so the same
            # script works in workflow_dispatch on any runner if needed.
            id=$(gh api "repos/$GITHUB_REPOSITORY/releases/$REL_ID/assets" \
                 --jq ".[] | select(.name==\"$old\") | .id")
            if [ -n "$id" ]; then
              echo "rename: $old → $new"
              gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/assets/$id" \
                -f "name=$new" >/dev/null
            else
              echo "skip: $old not present"
            fi
          }
          rename_asset "petpet_${VERSION}_universal.dmg" "petpet_${VERSION}.dmg"
          rename_asset "petpet_universal.app.tar.gz"    "petpet_${VERSION}.app.tar.gz"
          rename_asset "petpet_${VERSION}_x64_en-US.msi" "petpet_${VERSION}_x64.msi"
