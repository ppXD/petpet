# Tauri release builds for every supported platform.
#
# Triggered by pushing a `v*` tag (e.g. `v0.2.0`); produces a draft
# GitHub Release with installers attached:
#
#   macOS:   universal .dmg (arm64 + Intel in one bundle)
#   Linux:   .deb + .AppImage  (x86_64-unknown-linux-gnu)
#   Windows: .msi              (x86_64-pc-windows-msvc)
#
# The release is created as a draft so the maintainer reviews the
# artifacts before clicking "Publish" — that's the chance to catch a
# missing icon / broken installer before users see it.
#
# # macOS signing & notarization
#
# All Apple secrets are OPTIONAL. With them set, `tauri-action`
# signs + notarizes and produces a Gatekeeper-clean .dmg. Without
# them, the .dmg is unsigned and users need `xattr -cr` to launch
# (instructions in the release body).
#
# Required secrets for full notarization (skip any to fall back to
# unsigned):
#
#   APPLE_CERTIFICATE             base64(.p12 Developer ID Application cert)
#   APPLE_CERTIFICATE_PASSWORD    password of the .p12
#   APPLE_SIGNING_IDENTITY        e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                      Apple ID email
#   APPLE_PASSWORD                app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                 10-char team id from developer.apple.com
#
# # Why not test.yml's tag-push trigger?
#
# Releases are slower (~10–20 min per platform, especially Windows),
# heavier (frontend bundle + Tauri webview integration), and produce
# binaries — qualitatively different from the per-commit smoke tests
# in test.yml. Kept separate so a flaky release build doesn't block
# routine PR merges.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v0.1.0) — must already exist on the repo'
        required: true

permissions:
  contents: write    # tauri-action creates the release + uploads assets

jobs:
  publish-tauri:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
            label: 'macOS (universal)'
          - os: ubuntu-22.04
            args: ''
            label: 'Linux x64'
          - os: windows-latest
            args: ''
            label: 'Windows x64'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # ─── Toolchains ──────────────────────────────────────────────
      # macOS universal needs BOTH rustc targets so `lipo` can produce
      # a fat binary. Other platforms only need their native target.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets (universal build)
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          # Distinct cache per platform — they share zero artifacts.
          key: ${{ matrix.os }}-release

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      # ─── Sync version from tag into bundle manifests ─────────────
      # `tauri-action` stamps Tauri's bundle filenames from the version
      # field in tauri.conf.json — NOT from the git tag. If conf has
      # 0.1.0 but we're releasing v0.2.0, every artifact gets named
      # petpet_0.1.0_*, the tidy-asset-names job's globs (built off
      # the tag) miss, and the published draft ships with
      # `_universal` / `_en-US` suffixes still on it.
      #
      # Fix: rewrite the version in tauri.conf.json + package.json
      # from the tag BEFORE pnpm/tauri build. The repo's checked-in
      # version can stay at whatever the next planned release is
      # (or `0.1.0-dev`); the release pipeline is the source of truth.
      #
      # jq is pre-installed on every GitHub Actions runner image
      # (ubuntu/macos/windows). On Windows we run under Git-Bash
      # (the `shell: bash` directive) so the same one-liner works.
      - name: Sync version from tag to bundle manifests
        shell: bash
        working-directory: desktop
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Syncing version $VERSION into tauri.conf.json + package.json"

          TMP=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$TMP" && mv "$TMP" src-tauri/tauri.conf.json
          TMP=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$TMP" && mv "$TMP" package.json

          echo "After sync:"
          grep -E '"version"' src-tauri/tauri.conf.json package.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # ─── macOS signing env (conditional) ─────────────────────────
      # Tauri's bundler reads APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY
      # directly from process env. If we pass them as empty strings
      # (the default when secrets are unset), Tauri attempts to
      # `security import` an empty file and the build fails with
      # "failed to import keychain certificate".
      #
      # So: gate on APPLE_CERTIFICATE non-empty. Only export the
      # Apple vars to subsequent steps when a real cert is present.
      # Otherwise the env vars stay unset → Tauri falls back to
      # ad-hoc signing → unsigned .dmg + xattr workaround documented
      # in the release body.
      - name: Configure macOS signing env (if secrets available)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID }}
          APPLE_PWD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "macOS signing: ENABLED (notarized release)"
            {
              echo "APPLE_CERTIFICATE=$APPLE_CERT"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERT_PWD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_IDENTITY"
              echo "APPLE_ID=$APPLE_ID_EMAIL"
              echo "APPLE_PASSWORD=$APPLE_PWD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM"
            } >> "$GITHUB_ENV"
          else
            echo "macOS signing: DISABLED — APPLE_CERTIFICATE secret not set."
            echo "Build will produce an unsigned .dmg; users need 'xattr -cr' on install."
          fi

      # ─── Linux-only system deps ──────────────────────────────────
      # Tauri 2 on GTK needs webkit2gtk + AppIndicator headers to
      # produce the .deb / .AppImage. Pulled fresh per run (cheap;
      # ~30s) rather than cached — the runner image bumps versions
      # occasionally and a stale cache silently miscompiles.
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            file

      # ─── The actual build ────────────────────────────────────────
      # Apple env vars come from the preceding "Configure macOS signing
      # env" step (via $GITHUB_ENV), only when secrets are non-empty.
      # Passing them directly here as `env:` would set empty strings
      # for unconfigured repos, which breaks Tauri's bundler.
      - name: Build + publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'petpet ${{ inputs.tag || github.ref_name }}'
          # Release stays a draft so the maintainer can review artifacts
          # + edit the body before users see it.
          releaseDraft: true
          prerelease: false
          # Body is intentionally a placeholder — the `compose-release-body`
          # job below replaces it with auto-generated PR-grouped notes
          # (via GitHub's /generate-notes API + .github/release.yml) plus
          # a hand-curated install template. Keeping it minimal here so
          # premature publication of the draft surfaces this clearly.
          releaseBody: |
            _Release notes are being composed; this body will be replaced by the `compose-release-body` job in a moment. If you see this text after publish, that job failed — re-run the workflow._
          args: ${{ matrix.args }}

  # ─── Tidy artifact names ───────────────────────────────────────────
  # Tauri stamps platform / arch / locale into output names by default:
  #
  #   petpet_0.1.0_universal.dmg       ← drop "_universal"
  #   petpet_universal.app.tar.gz      ← drop "universal"
  #   petpet_0.1.0_x64_en-US.msi       ← drop "_en-US"
  #
  # Linux names (`_amd64.deb`, `.AppImage`, `.rpm`) are fine as-is.
  #
  # Runs as a separate job (not per-matrix step) to avoid:
  #   1. Race condition — every matrix entry uploads in parallel; the
  #      first one wins the release-creation race, others append. A
  #      per-matrix rename can fire BEFORE the release is fully
  #      populated → asset-not-found.
  #   2. Windows Git-Bash path-rewriting — `gh api "/repos/..."` on
  #      windows-latest gets `/repos/` rewritten to `C:/Program Files/
  #      Git/repos/...`. Running on ubuntu sidesteps it entirely.
  #   3. Draft-release tag mismatch — GitHub doesn't bind drafts to
  #      tags formally, so `/releases/tags/X` returns 404 for drafts.
  #      `gh release view <tag>` handles that correctly by listing
  #      drafts and matching by tag/name.
  tidy-asset-names:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Rename macOS + Windows assets to drop arch/locale noise
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # `--json id` returns the GraphQL Node ID (RE_kwDOSg…),
          # which the REST API /releases/{id}/assets rejects with 404.
          # `databaseId` is the numeric REST id (e.g. 1234567).
          REL_ID=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)
          echo "Release id: $REL_ID"

          rename_asset() {
            local old="$1" new="$2"
            local id
            # No leading `/` on endpoint — Windows Git-Bash issue is
            # ubuntu-irrelevant but keeping the convention so the same
            # script works in workflow_dispatch on any runner if needed.
            id=$(gh api "repos/$GITHUB_REPOSITORY/releases/$REL_ID/assets" \
                 --jq ".[] | select(.name==\"$old\") | .id")
            if [ -n "$id" ]; then
              echo "rename: $old → $new"
              gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/assets/$id" \
                -f "name=$new" >/dev/null
            else
              echo "skip: $old not present"
            fi
          }
          rename_asset "petpet_${VERSION}_universal.dmg" "petpet_${VERSION}.dmg"
          rename_asset "petpet_universal.app.tar.gz"    "petpet_${VERSION}.app.tar.gz"
          rename_asset "petpet_${VERSION}_x64_en-US.msi" "petpet_${VERSION}_x64.msi"

  # ─── Compose final release body ─────────────────────────────────────
  # Runs after assets are uploaded + renamed. Produces a professional
  # release body in two halves:
  #
  #   ① Auto-generated "What's Changed" — GitHub's REST endpoint
  #      `POST /repos/{owner}/{repo}/releases/generate-notes` groups
  #      PRs merged since the previous tag into categories driven by
  #      `.github/release.yml`. Adds a "Full Changelog" diff link.
  #
  #   ② Hand-curated install template — per-platform instructions
  #      with the exact asset filenames at this release's version.
  #      Includes the macOS `xattr -cr` workaround until we add
  #      Apple Developer notarization.
  #
  # The body gets written via `gh release edit --notes`. The release
  # stays draft so the maintainer reviews before clicking Publish.
  #
  # Why a separate job: same reasons as `tidy-asset-names` — runs once
  # on ubuntu after all matrix builds finish, no Windows path issues,
  # no race against tauri-action's release creation.
  compose-release-body:
    needs: [publish-tauri, tidy-asset-names]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
        with:
          # Need git tags to find the previous release for the
          # generate-notes API call's `previous_tag_name` argument.
          fetch-depth: 0

      - name: Compose + apply release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          # Previous release tag for the auto-notes diff window.
          # If we're at the FIRST tag ever, this is empty and we just
          # don't pass `previous_tag_name` to the API.
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -v "^${TAG}$" \
            | grep '^v[0-9]' \
            | head -1 || true)
          echo "Composing notes for $TAG (previous tag: ${PREV_TAG:-<none>})"

          # Build the JSON payload for generate-notes.
          if [ -n "$PREV_TAG" ]; then
            PAYLOAD=$(jq -n --arg tag "$TAG" --arg prev "$PREV_TAG" \
              '{tag_name: $tag, previous_tag_name: $prev}')
          else
            PAYLOAD=$(jq -n --arg tag "$TAG" '{tag_name: $tag}')
          fi

          AUTO_NOTES=$(echo "$PAYLOAD" \
            | gh api -X POST "repos/$REPO/releases/generate-notes" \
                --input - --jq .body)

          # The install template — uses a SINGLE-QUOTED heredoc so bash
          # doesn't try to expand anything inside (otherwise "SHA-256"
          # reads $5 from -256 and similar tricks fail under `set -u`).
          # Version + repo are substituted via placeholder replacement
          # after the fact.
          INSTALL_TEMPLATE=$(cat <<'TEMPLATE'
          ## 📦 Install

          ### 🍎 macOS (universal — Apple Silicon + Intel)

          Download `petpet___VERSION__.dmg`, drag petpet to `/Applications`, then clear macOS's quarantine attribute on first launch:

          ```sh
          xattr -cr /Applications/petpet.app
          ```

          ### 🐧 Linux x64

          Pick whichever your distro prefers:

          ```sh
          # Debian / Ubuntu
          sudo dpkg -i petpet___VERSION___amd64.deb

          # Fedora / RHEL
          sudo rpm -i petpet-__VERSION__-1.x86_64.rpm

          # Portable (no install needed)
          chmod +x petpet___VERSION___amd64.AppImage
          ./petpet___VERSION___amd64.AppImage
          ```

          ### 🪟 Windows x64

          Run `petpet___VERSION___x64.msi` for MSI install, or `petpet___VERSION___x64-setup.exe` for the NSIS variant.

          ---

          🤖 Built reproducibly from source at this tag via [`.github/workflows/release.yml`](https://github.com/__REPO__/blob/main/.github/workflows/release.yml).
          TEMPLATE
          )
          # Substitute placeholders — single-quoted heredoc above means
          # no bash expansion happened, so this is the safe spot.
          INSTALL_TEMPLATE="${INSTALL_TEMPLATE//__VERSION__/$VERSION}"
          INSTALL_TEMPLATE="${INSTALL_TEMPLATE//__REPO__/$REPO}"

          # Assemble final body: auto-notes on top, hand-written install
          # template below, separated by a horizontal rule.
          FINAL_BODY=$(printf '%s\n\n---\n\n%s' "$AUTO_NOTES" "$INSTALL_TEMPLATE")

          echo "==== Final body preview ===="
          echo "$FINAL_BODY" | head -60
          echo "============================"

          # Apply to the draft release. `--notes-file -` accepts stdin
          # so we don't have to worry about shell-quoting the body.
          echo "$FINAL_BODY" | gh release edit "$TAG" \
            --repo "$REPO" \
            --notes-file -

          echo "✓ Release body updated for $TAG"
